# Configuration git-cliff — Générateur de changelog
# Doc : https://git-cliff.org/docs/configuration

[changelog]
# Template Tera pour le contenu du changelog
header = """
# Changelog\n
Toutes les modifications notables de ce projet sont documentées dans ce fichier.\n
Le format est basé sur [Keep a Changelog](https://keepachangelog.com/fr/1.1.0/),
et ce projet adhère au [Semantic Versioning](https://semver.org/lang/fr/).\n
---\n
"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}⚠️ **BREAKING** {% endif %}\
{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))\
{% if commit.body %}\n  > {{ commit.body | trim }}\
{% endif %}\
{% endfor %}
{% endfor %}\n
"""

footer = """
---\n
{% for release in releases %}\
{% if release.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/creagleone/DataFlowBuilder/releases/tag/{{ release.version }}
{% else %}\
[Unreleased]: \
  https://github.com/creagleone/DataFlowBuilder/compare/{{ releases | first | map(attribute="version") | first }}...HEAD
{% endif %}\
{% endfor %}
"""

trim          = true
postprocessors = [
  { pattern = '<REPO>', replace = "https://github.com/creagleone/DataFlowBuilder" },
]

[git]
conventional_commits     = false
filter_unconventional    = false
split_commits            = false
commit_parsers = [
  # Ignorer les skip-ci
  { message = "\\[skip[ -]ci\\]", skip = true },
  { message = "^(?::.*:\\s*|[\u2600-\U0001FA9F]+\\s*)?feat|^✨|^🆕", group = "✨ Nouvelles fonctionnalités" },
  { message = "^(?::.*:\\s*|[\u2600-\U0001FA9F]+\\s*)?fix|^🐛|^🚑|^⚯", group = "🐛 Corrections de bugs" },
  { message = "^(?::.*:\\s*|[\u2600-\U0001FA9F]+\\s*)?docs|^📝|^💡", group = "📝 Documentation" },
  { message = "^(?::.*:\\s*|[\u2600-\U0001FA9F]+\\s*)?style|^🎨|^💄", group = "🎨 Style & UI" },
  { message = "^(?::.*:\\s*|[\u2600-\U0001FA9F]+\\s*)?refactor|^(?::.*:\\s*|[\u2600-\U0001FA9F]+\\s*)?test|^♻️|^🏗️|^🧪|^✅", group = "♻️ Qualité du Code & Tests" },
  { message = "^(?::.*:\\s*|[\u2600-\U0001FA9F]+\\s*)?perf|^⚡|^🚀", group = "⚡ Performances" },
  { message = "^(?::.*:\\s*|[\u2600-\U0001FA9F]+\\s*)?ci|^⚙️|^👷|^💚", group = "⚙️ CI/CD" },
  { message = "^(?::.*:\\s*|[\u2600-\U0001FA9F]+\\s*)?security|^🔒|^🔐", group = "🔒 Sécurité" },
  # ...rest unchanged
  { message = "^(?::.*:\\s*|[\u2600-\U0001FA9F]+\\s*)?chore|^🔧", group = "🔧 Maintenance" },
  # Catch-all : tout ce qui n'a pas matché va dans Misc
  { message = ".*", group = "🔀 Changements divers" },
]
protect_breaking_commits = false
filter_commits           = false
tag_pattern              = "v[0-9].*"
skip_tags                = "v0\\.1\\.0-beta\\.1"
ignore_tags              = ""
topo_order               = false
sort_commits             = "oldest"
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/creagleone/DataFlowBuilder/issues/$1" },
]
